services:
  - type: web
    name: moeatwi-acs-backend
    runtime: node
    plan: free
    repo: https://github.com/moeatwi/senior-full
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: moeatwi-acs-frontend
    runtime: static
    repo: https://github.com/moeatwi/senior-full
    branch: main
    buildCommand: npm install && npm install @supabase/supabase-js && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_SUPABASE_URL
        sync: false
      - key: REACT_APP_SUPABASE_ANON_KEY
        sync: false
      - key: REACT_APP_API_URL
        sync: false
      - key: CI
        value: false
